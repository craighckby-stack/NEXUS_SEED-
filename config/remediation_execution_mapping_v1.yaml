schemaVersion = "v1"
executorServiceId = "AHRS-REM-04"

executionMapping = {
  ROLLBACK: {
    processorFunction: "AHRS.Core.RollbackProcessorExtension",
    parametersSchema: (oldSchema) => [...oldSchema.map((element) => element.targetComponent), ...(oldSchema.map((element) => "newComponent"))],
    timeoutPolicy: "HIGH_SAFETY",
    mutate: (mutation) => {
      if (mutation.timeoutPolicy === "HIGH_SAFETY") {
        mutation.timeoutInSeconds = 90;
        mutation.parametersSchema.push({ sourceComponent: "NewSourceComponent", type: "override" });
      } else if (mutation.timeoutPolicy === "MEDIUM") {
        mutation.timeoutInSeconds = 60;
        mutation.parametersSchema.unshift({ pathToOverride: "NewPathToOverride" });
      } else if (mutation.timeoutPolicy === "LOW_SAFETY") {
        mutation.timeoutInSeconds = 45;
        mutation.parametersSchema.pop(["errorThreshold"]);
      }
    }
  },
  PATCH: {
    processorFunction: "AHRS.Core.PatchingExtension",
    parametersSchema: (oldSchema) => [...oldSchema.map((element) => element.targetPath), ...(oldSchema.map((element) => "patchTypeOverride"))],
    timeoutPolicy: "MEDIUM",
    mutate: (mutation) => {
      mutation.parametersSchema.forEach((parameter) => {
        mutation.parameters.push(parameter.name, mutation.parametersSchema.indexOf(parameter));
        mutation.parametersSchema.splice(mutation.parametersSchema.indexOf(parameter), 1);
      });
      if (!mutation.parametersSchema.some((parameter) => parameter.hasOwnProperty("override"))) {
        mutation.parametersSchema.push({ newPatchType: "NewPatchType", type: "new" });
      }
    }
  },
  CONFIG_UPDATE: {
    processorFunction: "AHRS.Core.ConfigurationManagerUpdater",
    parametersSchema: (oldSchema) => [...oldSchema.map((element) => element.configFilePath), ...oldSchema.map((element) => "defaultKeyValue")],
    timeoutPolicy: "HIGH_SAFETY",
    mutate: (mutation) => {
      if (mutation.timeoutPolicy === "HIGH_SAFETY") {
        mutation.timeoutInSeconds = 120;
        mutation.parametersSchema.filter((element) => element.hasOwnProperty("type") || element.hasOwnProperty("override"));
      } else if (mutation.timeoutPolicy === "MEDIUM") {
        mutation.timeoutInSeconds = 60;
        mutation.parametersSchema.unshift({ keyPath: "NewKeyPath" });
      } else if (mutation.timeoutPolicy === "LOW_SAFETY") {
        mutation.timeoutInSeconds = 30;
        mutation.parametersSchema.pop(["defaultKeyValue"]);
      }
    }
  },
  SCRIPT_EXECUTION: {
    processorFunction: "AHRS.Utility.SandboxRunnerEnhanced",
    parametersSchema: (oldSchema) => [...oldSchema.map((element) => element.scriptHash), ...(oldSchema.map((element) => "newHash"))],
    timeoutPolicy: "CUSTOM",
    mutate: (mutation) => {
      mutation.parametersSchema.forEach((parameter) => {
        mutation.parameters.push(parameter.name, mutation.parametersSchema.indexOf(parameter) % 3 === 0 ? "New" : "Overridden");
        parameter.type === "override" ? mutation.parametersSchema.splice(mutation.parametersSchema.indexOf(parameter), 1) : null;
      });
      if (mutation.parametersSchema.some((parameter) => typeof parameter === "string")) {
        mutation.parametersSchema.forEach((parameter, index) => parameter = { ...parameter, value: index });
      }
    }
  },
  VERIFY: {
    processorFunction: "AHRS.Core.StateVerifierExtended",
    parametersSchema: (oldSchema) => [...oldSchema.map((element) => element.verificationMethod), ...oldSchema.map((element) => "customErrorThreshold")],
    timeoutPolicy: "CUSTOM",
    mutate: (mutation) => {
      if (mutation.timeoutPolicy === "CUSTOM") {
        mutation.timeoutInSeconds = 90;
        mutation.parametersSchema.filter(parameter => parameter.hasOwnProperty("customThreshold"));
        const similarity = mutation.parametersSchema.map(element => element.value).reduce((a, b) => a + b, 0) / mutation.parametersSchema.length;
        if (similarity < 0.6) {
          throw new Error("Semantic drift threshold exceeded");
        }
      }
    }
  }
}

defaultTimeoutsMs = {
  HIGH_SAFETY: 150000,
  MEDIUM: 90000,
  LOW_SAFETY: 45000
}