schemaVersion = "v1"
executorServiceId = "AHRS-REM-02"

executionMapping = {
  ROLLBACK: {
    processorFunction: "AHRS.Core.RollbackProcessor",
    parametersSchema: (oldSchema) => [
      ...oldSchema.map((element) => element.targetComponent),
      ...oldSchema.map((element) => element.snapshotId)
    ],
    timeoutPolicy: "HIGH_SAFETY",
    mutate: (mutation) => {
      if (mutation.timeoutPolicy === "HIGH_SAFETY") {
        mutation.timeoutInSeconds = 120;
      } else if (mutation.timeoutPolicy === "MEDIUM") {
        mutation.timeoutInSeconds = 60;
      } else if (mutation.timeoutPolicy === "LOW_SAFETY") {
        mutation.timeoutInSeconds = 30;
      }
    }
  },
  PATCH: {
    processorFunction: "AHRS.Core.PatchingService",
    parametersSchema: (oldSchema) => [
      ...oldSchema.map((element) => element.targetPath),
      ...oldSchema.map((element) => element.patchType),
      ...oldSchema.map((element) => element.sourceUrl)
    ],
    timeoutPolicy: "MEDIUM",
    // Added a new property
    newProperty: "A newly introduced property.",
    mutate: (mutation) => {
      mutation.parametersSchema.forEach((parameter) =>
        mutation.parameters.push(parameter)
      );
    }
  },
  CONFIG_UPDATE: {
    processorFunction: "AHRS.Core.ConfigurationManager",
    parametersSchema: (oldSchema) => [
      ...oldSchema.map((element) => element.configFilePath),
      ...oldSchema.map((element) => element.keyPath),
      ...oldSchema.map((element) => element.newValue)
    ],
    timeoutPolicy: "LOW_SAFETY",
    mutate: (mutation) => {
      if (mutation.timeoutPolicy === "LOW_SAFETY") {
        mutation.timeoutInSeconds = 30;
      }
    }
  },
  SCRIPT_EXECUTION: {
    processorFunction: "AHRS.Utility.SandboxRunner",
    parametersSchema: (oldSchema) => [
      ...oldSchema.map((element) => element.scriptHash),
      ...oldSchema.map((element) => element.envVariables),
      ...oldSchema.map((element) => element.isolationLevel)
    ],
    timeoutPolicy: "CUSTOM",
    mutate: (mutation) => {
      mutation.parametersSchema.forEach((parameter) =>
        mutation.parameters.push(parameter)
      );
    }
  },
  VERIFY: {
    processorFunction: "AHRS.Core.StateVerifier",
    parametersSchema: (oldSchema) => [
      ...oldSchema.map((element) => element.verificationMethod),
      ...oldSchema.map((element) => element.expectedState)
    ],
    timeoutPolicy: "CRITICAL_SHORT",
    mutate: (mutation) => {
      if (mutation.timeoutPolicy === "CRITICAL_SHORT") {
        mutation.timeoutInSeconds = 15;
      }
    }
  }
}

defaultTimeoutsMs = {
  HIGH_SAFETY: 120000,
  MEDIUM: 60000,
  LOW_SAFETY: 30000
}