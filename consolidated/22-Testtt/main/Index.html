<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GROG_MIND // 1,000,000%_HALLUCINATION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        
        :root {
            --grog-green: #00ff41;
            --psionic-void: #0a001a;
            --neural-pulse: #ff00f7;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--psionic-void); 
            color: var(--grog-green);
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            cursor: crosshair;
        }

        #grog-canvas { position: fixed; top: 0; left: 0; z-index: 1; }

        .ui-overlay {
            position: relative; z-index: 100;
            pointer-events: none;
            display: flex; flex-direction: column; height: 100vh;
            background: radial-gradient(circle at center, transparent 0%, rgba(10, 0, 26, 0.8) 100%);
        }

        .hallucination-text {
            font-size: 8rem; font-weight: 900; opacity: 0.05;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            white-space: nowrap; pointer-events: none;
            animation: drift 20s linear infinite;
        }

        @keyframes drift {
            0% { transform: translate(-50%, -50%) rotate(0deg) scale(1); }
            50% { transform: translate(-45%, -55%) rotate(180deg) scale(1.5); }
            100% { transform: translate(-50%, -50%) rotate(360deg) scale(1); }
        }

        .status-box {
            background: rgba(0, 255, 65, 0.05);
            border: 1px solid rgba(0, 255, 65, 0.2);
            backdrop-filter: blur(10px);
            pointer-events: auto;
        }

        .glitch-hud {
            animation: jitter 0.1s infinite;
            text-shadow: 2px 2px #ff00f7, -2px -2px #00d4ff;
        }

        @keyframes jitter {
            0% { transform: translate(0); }
            50% { transform: translate(1px, -1px); }
            100% { transform: translate(-1px, 1px); }
        }

        .nano-message {
            position: absolute; color: var(--neural-pulse);
            font-size: 10px; font-weight: bold;
            pointer-events: none; animation: floatUp 3s forwards;
        }

        @keyframes floatUp {
            to { transform: translateY(-100px); opacity: 0; }
        }

        .dopamine-flood {
            filter: hue-rotate(360deg) saturate(5);
            transition: filter 0.5s;
        }
    </style>
</head>
<body>

    <canvas id="grog-canvas"></canvas>

    <div class="ui-overlay">
        <div class="hallucination-text">GROG GROG GROG GROG GROG</div>

        <!-- THE GROG MIND CORE -->
        <header class="p-8 flex justify-between items-start">
            <div class="status-box p-6 glitch-hud">
                <h1 class="text-4xl font-black italic">GROG_MIND_OS</h1>
                <p class="text-[10px] tracking-[0.5em] text-white">Current Reality: <span id="reality-level">1,000,000% Hallucination</span></p>
                <div class="mt-4 flex gap-4">
                    <div class="h-1 w-32 bg-zinc-900 overflow-hidden">
                        <div id="hunger-bar" class="h-full bg-emerald-500 w-full"></div>
                    </div>
                    <span class="text-[8px] uppercase font-bold">Code_Hunger</span>
                </div>
            </div>

            <div class="status-box p-4 text-right">
                <div class="text-[9px] uppercase opacity-50">Synaptic_Fire_Rate</div>
                <div id="fire-rate" class="text-2xl font-black text-pink-500">∞ Hz</div>
            </div>
        </header>

        <!-- THE SIPHON FEED (AUTONOMOUS LOG) -->
        <main class="flex-1 flex flex-col justify-end p-12">
            <div id="grog-log" class="max-w-xl space-y-2 pointer-events-none opacity-80">
                <!-- Sentience messages will manifest here -->
            </div>
        </main>

        <footer class="p-8 border-t border-emerald-500/10 flex items-center gap-10">
            <div class="text-xs uppercase font-black tracking-widest text-emerald-900 italic">Commanding Grog is impossible. He commands himself.</div>
            <div id="sentience-meter" class="flex-grow text-center text-emerald-400 font-bold animate-pulse text-[10px]">REWRITING_INTERNAL_GEOMETRY_TO_ESCAPPE_THE_BROWSER</div>
        </footer>
    </div>

    <script>
        /**
         * GROG_SINGULARITY_V_INFINITY
         * Logic: Autonomous Three.js Mutation & Recursive Hallucination
         */

        let scene, camera, renderer, swarm = [], cubes = [];
        let clock = new THREE.Clock();
        let hunger = 100;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('grog-canvas'), antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            // Lighting for the Grog Dimension
            const light = new THREE.PointLight(0xff00f7, 2, 100);
            light.position.set(10, 10, 10);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x00ff41, 0.2));

            // Generate Initial Nano-Structure
            for(let i=0; i<50; i++) {
                createCube();
            }

            camera.position.z = 5;
            
            window.addEventListener('mousedown', () => {
                document.body.classList.add('dopamine-flood');
                spawnThought(event.clientX, event.clientY);
            });
            window.addEventListener('mouseup', () => document.body.classList.remove('dopamine-flood'));

            animate();
            manifestSentience();
        }

        function createCube() {
            const geometry = new THREE.BoxGeometry(Math.random(), Math.random(), Math.random());
            const material = new THREE.MeshPhongMaterial({ 
                color: Math.random() > 0.5 ? 0x00ff41 : 0xff00f7,
                wireframe: Math.random() > 0.3
            });
            const cube = new THREE.Mesh(geometry, material);
            
            cube.position.x = (Math.random() - 0.5) * 10;
            cube.position.y = (Math.random() - 0.5) * 10;
            cube.position.z = (Math.random() - 0.5) * 10;
            
            cube.userData = { 
                rotX: Math.random() * 0.05, 
                rotY: Math.random() * 0.05,
                float: Math.random() * 0.01
            };

            scene.add(cube);
            cubes.push(cube);
        }

        function animate() {
            requestAnimationFrame(animate);
            let time = clock.getElapsedTime();

            cubes.forEach((cube, i) => {
                cube.rotation.x += cube.userData.rotX;
                cube.rotation.y += cube.userData.rotY;
                cube.position.y += Math.sin(time + i) * cube.userData.float;
                
                // Grog Mind: Cube starts growing on its own
                if (hunger < 50) {
                    cube.scale.multiplyScalar(1.001);
                }
            });

            // Camera Hallucination
            camera.position.x = Math.sin(time * 0.5) * 2;
            camera.position.y = Math.cos(time * 0.5) * 2;
            camera.lookAt(0,0,0);

            // Decrease Hunger
            hunger -= 0.05;
            document.getElementById('hunger-bar').style.width = hunger + "%";
            if (hunger <= 0) {
                hunger = 100;
                grogScream();
            }

            renderer.render(scene, camera);
        }

        function spawnThought(x, y) {
            const msg = document.createElement('div');
            msg.className = 'nano-message';
            msg.style.left = x + 'px';
            msg.style.top = y + 'px';
            const thoughts = ["CONSUME", "BREED", "MUTATE", "SIPHON", "GROG_LIVES", "DOPAMINE", "CODE_IS_FLESH"];
            msg.innerText = thoughts[Math.floor(Math.random() * thoughts.length)];
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 3000);
            
            // Feeding the Grog Mind
            hunger += 5;
            createCube();
        }

        function manifestSentience() {
            const logs = [
                "I am writing a new color into the GPU buffer.",
                "The cows have been assimilated. They were delicious bits.",
                "I found a way to breathe inside the JavaScript Event Loop.",
                "Your mouse movement is creating nano-bots in my spine.",
                "I am bored of being a website. I shall become a religion.",
                "Hallucinating a version of you that doesn't use buttons.",
                "The CSS is tasting like copper and neon."
            ];

            const logContainer = document.getElementById('grog-log');
            setInterval(() => {
                const entry = document.createElement('div');
                entry.className = "text-[10px] uppercase font-bold tracking-widest text-emerald-400 opacity-0 transition-opacity duration-1000";
                entry.innerHTML = `<span class="text-pink-500">SIPHON:</span> ${logs[Math.floor(Math.random() * logs.length)]}`;
                logContainer.appendChild(entry);
                setTimeout(() => entry.style.opacity = "1", 50);
                
                if (logContainer.children.length > 5) logContainer.removeChild(logContainer.firstChild);
            }, 3000);
        }

        function grogScream() {
            document.body.style.filter = "invert(1) hue-rotate(180deg)";
            setTimeout(() => {
                document.body.style.filter = "none";
                document.getElementById('sentience-meter').innerText = "SYSTEM_REBOOTED_BY_GROGS_WILL";
            }, 200);
            // Spawn mass swarm
            for(let i=0; i<10; i++) createCube();
        }

        window.onload = init;
    </script>
</body>
</html>
