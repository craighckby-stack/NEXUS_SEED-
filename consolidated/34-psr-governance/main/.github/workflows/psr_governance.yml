name: PSR Governance - Integrated Quality & Performance Gates

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      mode:
        description: 'Regression mode (baseline/validate/enforce)'
        required: true
        default: 'validate'
        type: choice
        options:
          - baseline
          - validate
          - enforce

jobs:
  # ========================================================================
  # GATE 1: Static Analysis & Security
  # ========================================================================
  static_analysis:
    name: Static Analysis & Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Setup Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'
    
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint bandit
    
    - name: Security Scan (Bandit)
      run: |
        bandit -r src/psr_governance -ll
      continue-on-error: false
    
    - name: Code Quality (Pylint)
      run: |
        pylint src/psr_governance/flux_node.py \
          --disable=C0114,C0115,C0116 \
          --fail-under=8.0
      continue-on-error: true

  # ========================================================================
  # GATE 2: Functional Tests
  # ========================================================================
  functional_tests:
    name: Functional Test Vectors
    runs-on: ubuntu-latest
    needs: static_analysis
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Setup Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    
    - name: Install Package
      run: |
        pip install -e .
    
    - name: Execute Test Vectors
      run: python -m psr_governance.test_vectors
      timeout-minutes: 10
    
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: functional-test-results
        path: test_results_*.log

  # ========================================================================
  # GATE 3: Chaos Engineering
  # ========================================================================
  chaos_testing:
    name: Chaos Engineering Scenarios
    runs-on: ubuntu-latest
    needs: static_analysis
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Setup Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    
    - name: Install Package
      run: |
        pip install -e .
    
    - name: Execute Chaos Scenarios
      run: python -m psr_governance.chaos_suite
      timeout-minutes: 15
    
    - name: Upload Chaos Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: chaos-engineering-report
        path: chaos_report_*.log

  # ========================================================================
  # GATE 4: Performance Regression
  # ========================================================================
  performance_regression:
    name: Performance Regression Analysis
    runs-on: ubuntu-latest
    needs: [functional_tests, chaos_testing]
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Setup Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    
    - name: Install Package
      run: |
        pip install -e .
    
    - name: Restore Performance Baselines
      uses: actions/cache@v4
      with:
        path: .performance_baselines/
        key: performance-baselines-${{ github.base_ref || 'main' }}
        restore-keys: |
          performance-baselines-
    
    - name: Determine Regression Mode
      id: mode
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
        elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
          echo "mode=enforce" >> $GITHUB_OUTPUT
        elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
          echo "mode=validate" >> $GITHUB_OUTPUT
        else
          echo "mode=validate" >> $GITHUB_OUTPUT
        fi
    
    - name: Execute Regression Framework
      env:
        REGRESSION_MODE: ${{ steps.mode.outputs.mode }}
        GITHUB_SHA: ${{ github.sha }}
      run: python -m psr_governance.regression_framework
      timeout-minutes: 20
    
    - name: Save Updated Baselines
      if: steps.mode.outputs.mode == 'baseline' || github.ref == 'refs/heads/main'
      uses: actions/cache/save@v4
      with:
        path: .performance_baselines/
        key: performance-baselines-${{ github.sha }}
    
    - name: Upload Performance Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: performance-regression-report
        path: |
          .performance_baselines/
          performance_report_*.log

  # ========================================================================
  # GATE 5: Integration Report
  # ========================================================================
  integration_report:
    name: Generate Integration Report
    runs-on: ubuntu-latest
    needs: [static_analysis, functional_tests, chaos_testing, performance_regression]
    if: always()
    
    steps:
    - name: Download All Artifacts
      uses: actions/download-artifact@v4
    
    - name: Generate Unified Report
      run: |
        echo "# PSR Governance - CI/CD Integration Report" > integration_report.md
        echo "" >> integration_report.md
        echo "**Commit:** ${{ github.sha }}" >> integration_report.md
        echo "**Branch:** ${{ github.ref_name }}" >> integration_report.md
        echo "**Timestamp:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> integration_report.md
        echo "" >> integration_report.md
        echo "## Gate Status" >> integration_report.md
        echo "" >> integration_report.md
        echo "- Static Analysis: ${{ needs.static_analysis.result }}" >> integration_report.md
        echo "- Functional Tests: ${{ needs.functional_tests.result }}" >> integration_report.md
        echo "- Chaos Engineering: ${{ needs.chaos_testing.result }}" >> integration_report.md
        echo "- Performance Regression: ${{ needs.performance_regression.result }}" >> integration_report.md
    
    - name: Upload Integration Report
      uses: actions/upload-artifact@v4
      with:
        name: integration-report
        path: integration_report.md
    
    - name: Comment on PR (if applicable)
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const report = fs.readFileSync('integration_report.md', 'utf8');

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: report
          });
